version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: citas_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-citas_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - citas_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: citas_backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-citas_db}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_EXPIRE: ${JWT_EXPIRE:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret}
      JWT_REFRESH_EXPIRE: ${JWT_REFRESH_EXPIRE:-7d}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - citas_network
    command: npm run dev

volumes:
  postgres_data:

networks:
  citas_network:
    driver: bridge
